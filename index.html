<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maison Rosie — Étrigny</title>
<style>
  :root {
    --cream: #faf3e3;
    --ink: #1f4133;
    --accent: #c89a4f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--cream);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    min-height: 100vh;
  }
  header {
    text-align: center;
    margin-bottom: 32px;
  }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(28px, 7vw, 42px);
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--ink);
  }
  .sub {
    font-family: Georgia, serif;
    font-style: italic;
    color: var(--accent);
    font-size: clamp(16px, 4vw, 20px);
    margin-top: 6px;
  }
  .hint {
    margin-top: 24px;
    font-size: 14px;
    color: #6a6a6a;
    text-align: center;
  }
  main {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  a.lang {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 18px 22px;
    background: #fff;
    border: 2px solid transparent;
    border-radius: 14px;
    text-decoration: none;
    color: var(--ink);
    font-size: 20px;
    font-weight: 500;
    box-shadow: 0 1px 3px rgba(0,0,0,.04);
    transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
  }
  a.lang:hover, a.lang:active {
    transform: translateY(-1px);
    border-color: var(--accent);
    box-shadow: 0 4px 12px rgba(0,0,0,.08);
  }
  .flag {
    font-size: 36px;
    line-height: 1;
    flex-shrink: 0;
  }
  .name { flex: 1; }
  .arrow {
    color: var(--accent);
    font-size: 22px;
  }
  footer {
    margin-top: 36px;
    font-size: 12px;
    color: #999;
    text-align: center;
  }
</style>
</head>
<body>
<header>
  <h1>MAISON ROSIE</h1>
  <div class="sub">La Rosinette — Étrigny</div>
</header>
<main>
  <a class="lang" href="pdfs/fr.pdf">
    <span class="flag">🇫🇷</span>
    <span class="name">Français</span>
    <span class="arrow">→</span>
  </a>
  <a class="lang" href="pdfs/en.pdf">
    <span class="flag">🇬🇧</span>
    <span class="name">English</span>
    <span class="arrow">→</span>
  </a>
  <a class="lang" href="pdfs/de.pdf">
    <span class="flag">🇩🇪</span>
    <span class="name">Deutsch</span>
    <span class="arrow">→</span>
  </a>
  <a class="lang" href="pdfs/it.pdf">
    <span class="flag">🇮🇹</span>
    <span class="name">Italiano</span>
    <span class="arrow">→</span>
  </a>
  <a class="lang" href="pdfs/es.pdf">
    <span class="flag">🇪🇸</span>
    <span class="name">Español</span>
    <span class="arrow">→</span>
  </a>
</main>
</body>
</html>
